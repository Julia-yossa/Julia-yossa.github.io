        <div class="container mx-auto px-4">
            <nav class="flex items-center justify-between h-20" role="navigation" aria-label="Main">
                <button id="lang-toggle" class="bg-card-light dark:bg-card-dark border border-border-light dark:border-border-dark text-indigo-600 dark:text-indigo-400 py-2 px-4 rounded-full text-sm font-semibold focus:outline-none hover:bg-base-light dark:hover:bg-gray-700 transition-colors" aria-label="Toggle language between English and French">
                    Français / English
                </button>
                <a href="index.html" class="text-2xl font-bold ml-4">JY</a>
                <ul class="hidden md:flex space-x-8 ml-auto">

                <li><a href="index.html#about" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="About" data-lang-fr="À propos">About</a></li>
                <li><a href="blog.html" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="Insights" data-lang-fr="Réflexions">Insights</a></li>

            </ul>

    <main class="pt-28 pb-20">
        <article class="container mx-auto px-4 max-w-4xl">
            <a href="blog.html" class="inline-flex items-center gap-2 text-sm text-indigo-400 hover:text-indigo-300 transition-colors mb-8" data-lang-en="← Back to all posts" data-lang-fr="← Retour aux articles">← Back to all posts</a>
            <img id="post-image" class="w-full h-72 md:h-96 object-cover rounded-2xl shadow-2xl mb-10" alt="">
            <p id="post-date" class="text-sm uppercase tracking-[0.25em] text-text-muted-light dark:text-text-muted-dark mb-4"></p>
            <h1 id="post-title" class="text-4xl md:text-5xl font-bold mb-8 leading-tight"></h1>
            <div id="post-content" class="text-lg text-text-main-light dark:text-text-main-dark space-y-6 leading-8"></div>
            <div id="post-error" class="hidden rounded-xl border border-red-500/40 bg-red-500/10 p-6 text-red-100"></div>
        </article>
    </main>

    <footer class="bg-card-light dark:bg-card-dark py-6 border-t border-border-light dark:border-border-dark">
        <div class="container mx-auto px-4 text-center text-text-muted-light dark:text-text-muted-dark">
            <p>Built with 💜 by Julia Yossa</p>
        </div>
    </footer>

    <script src="script.js"></script>
